body:
  text: 元始天尊説得道了身經爾時元始天尊在玉清聖境清微天宫鬱羅簫臺之中森羅淨泓之上現虛無自然有為真聖相恢元始無極大道闡揚混沌未分先天真奧妙論清靜無為全真大道為諸天仙衆説此生天得道全真了身經夫修鍊了身飲食有則禁口獨坐口唇相沾牙齒相對眼不觀邪色耳不聽淫聲洗心滌慮對境忘境萬緣消息外想不入內想不出莫起一念萬事俱忘凝耳韻含眼光緘舌氣調鼻息存神定意一心內守調息綿綿微微輕出似有而無莫教間斷息依神定性定命住性命雙全形神俱妙與道合真湛湛澄澄杳杳冥冥昏昏默默鈍純全全混混沌沌精神魂魄意三五混融三元輻輳合和四象五氣朝元三花聚頂返本還元復命歸根萬神歸一無所不包無所不容自然心火下降腎水上升口裏津液自然而生烹煎煆鍊久久不散自然體中血脈如風行腹中如雷聲鳴無絃之曲不撫而自聲不鼓而自鳴沖和氣透醍醐灌頂甘露灑心晝夜無眠三千日足功成果滿隂盡陽純聖胎成就身內有身神成真聖真聖合太虛太虛合真空真空合虛無自然虛無自然是元始真一元始真一是吾真身也先天而生生而無形先天而長長而無體誰無形體大道常存永劫不朽不壞萬聖同居得觀內境見虛無之事神自言語與天地齊壽日月同年脫離生死方得全真道果天得真一神光清明地得真一萬物發生邪得真一自然歸正神得真一千靈萬聖人得真一真神仙胎也道本虛無三才六合之中無所不靈無所不聖道乃萬聖之祖萬物之宗清靜混沌凝神鍊氣二六時中常清常靜靈臺無念為清一念不起為靜意定神全水源清意動神行水源濁此是木金真間隔飲食太飽息氣難定眼光不凝神光不明耳不純聽神不得住聲色不絶精氣不全萬緣不純神不安寧神不安寧心神不靈心神不靈聖胎不成聖胎不成為隂靈下鬼身是氣宅心是神舍意動則有為有為則神動神動則氣散有為真動不動靜在其中矣息依神定純純全全混混沌沌神凝氣結全真無為萬神歸一則神氣聚神氣聚則五行具氣結成刀圭神氣津液為真水火咽津服氣為飲刀圭一名醍醐灌頂甘露灑心一名洗心滌慮心神不動為之真沐浴真清真靜動在其中矣修行道人不識動靜真機不逹真常全真道理如何得道成真息不動意定為之抽意不動神凝為之添神凝意動為武錬息定神凝為文烹外想不入內想不出為固濟二氣交合各一斤虛無自然為運用萬神歸一為守成性定命住為養火鍊氣成神為真金心火下降為復命腎水上升為歸根火迎真水為金液水迎真火為還丹五行凝結為九還隂盡陽純為七返降伏內魔為野戰神全無欠為全真精血氣神真種子神凝氣結合真空中宫貽意為黃婆金情木性為夫婦心神真汞為姹女精氣真鉛為嬰兒精凝形固成黑龜鍊神凝結為赤蛇煆錬呼吸為龍虎龍虎龜蛇成一塊為和合四象一性攝情為金木併隂陽還返為水火交火與木同源兩性一家南二東三同成五南二心神火也東三肝木性也此是火生於木也水與金同源兩性一家北一西四同成五北一腎精水也西四肺金情也此是水生於金也中五屬土土者意也呼則虎嘯風生虎嘯則汞投鉛汞即是性性即是砂中汞砂汞即是離中隂離中隂即是人心中神氣也息意定則神氣全神氣全則了性吸則龍吟雲起龍吟雲起則鉛投汞鉛即是命命即是水中金水中金即是鍊精化氣鍊精化氣即是精氣凝精氣凝則形固形堅固則精氣全精氣全即了命性命雙全精氣血滿神凝氣結三千功滿鍊就純陽是為富國安民精鍊成日精血鍊就月華氣鋉成黃金髓鍊就白玉腦鍊成丹砂腎鍊就硨磲心鍊成珊瑚此是七寶居身不散功成行滿跨鳯乘鸞飛升金闕上朝玉帝永為真神仙矣元始天尊説得道了身經
