body:
  text: 元始天尊說得道了身經爾時元始天尊在玉淸聖境淸微天宮鬱羅蕭臺之中森羅淨泓之上現虛無自然有爲眞聖相恢元始無極大道闡揚混沌未分先天眞奥妙論淸靜無爲全眞大道爲諸天仙眾說此生天得道全眞了身經夫修鍊了身飲食有則禁口獨坐口唇相沾牙齒相對眼不觀邪色耳不聽淫聲洗心滌慮對境忘境萬緣消息外想不入内想不出莫起一念萬事俱忘凝耳韻含眼光緘舌炁調鼻息存神定意一心内守調息綿綿微微輕出似有而無莫教間斷息依神定性定命住性命雙全形神俱妙與道合眞湛湛澄澄杳杳㝠㝠昏昏默默純純全全混混沌沌精神魂魄意三五混融三元輻輳合和四象五炁朝元三花聚頂返本還元復命歸根萬神歸一無所不包無所不容自然心火下降腎水上昇口裏津液自然而生烹煎煆鍊久久不散自然體中血脉如風行腹中如雷聲鳴無絃之曲不撫而自聲不鼓而自鳴沖和炁透醍醐灌頂甘露灑心晝夜無眠三千日足功成果滿陰盡陽純聖胎成就身内有身神成眞聖眞聖合太虛太虛合眞空眞空合虛無自然虛無自然是元始眞一元始眞一是吾眞身也先天而生生而無形先天而長長而無體雖無形體大道常存永劫不朽不壞萬聖同居得觀内境見虛無之事神自言語與天地齊壽日月同年脫離生死方得全眞道果天得眞一神光淸明地得眞一萬物發生邪得眞一自然歸正神得眞一千靈萬聖人得眞一眞神仙胎也道本虛無三才六合之中無所不靈無所不聖道乃萬聖之祖萬物之宗淸靜混沌凝神鍊炁二六時中常淸常靜靈臺無念爲淸一念不起爲靜意定神全水源淸意動神行水源濁此是木金眞間隔飲食太飽息炁難定眼光不凝神光不明耳不絶聽神不得住聲色不絶精炁不全萬緣不絶神不安寕神不安寕心神不靈心神不靈聖胎不成聖胎不成爲陰靈下鬼身是炁宅心是神舍意動則有爲有爲則神動神動則炁散有爲眞動不動靜在其中矣息依神定純純全全混混沌沌神凝炁結全眞無爲萬神歸一則神炁聚神炁聚則五行眞炁結成刀圭神炁津液爲眞水火嚥津服炁爲飲刀圭一名醍醐灌頂甘露灑心一名洗心滌慮心神不動爲之眞沐浴眞淸眞靜動在其中矣修行道人不識動靜眞機不達眞常全眞道理如何得道成眞息不動意定爲之抽意不動神凝爲之添神凝意動爲武鍊息定神凝爲文烹外想不入内想不出爲固濟二炁交合各一斤虛無自然爲運用萬神歸一爲守成性定命住爲養火鍊炁成神爲眞金心火下降爲復命腎水上昇爲歸根火迎眞水爲金液水迎眞火爲還丹五行凝結爲九還陰盡陽純爲七返降伏内魔爲野戰神全無欠爲全眞精血炁神眞種子神凝炁結合眞空中宮胎意爲黃婆金情木性爲夫婦心神眞汞爲姹女精炁眞鉛爲嬰兒精凝形固成黑龜鍊神凝結爲赤蛇煆鍊呼吸爲龍虎龍虎龜蛇成一塊爲和合四象一性攝情爲金木併陰陽還返爲水火交火與木同源兩性一家南二東三同成五南二心神火也東三肝木性也此是火生於木也水與金同源兩性一家北一西四同成五北一腎精水也西四肺金情也此是水生於金也中五屬土土者意也呼則虎嘯風生虎嘯則汞投鉛汞卽是性性卽是砂中汞砂汞卽是離中陰離中陰卽是人心中神炁也息意定則神炁全神炁全則了性吸則龍吟雲起龍吟雲起則鉛投汞鉛卽是命命卽是水中金水中金卽是鍊精化炁鍊精化炁卽是精炁凝精炁凝則形堅固形堅固則精炁全精炁全卽了命性命雙全精炁血滿神凝炁結三千功滿鍊就純陽是爲富國安民精鍊成日精血鍊就月華炁鍊成黃金髓鍊就白玉腦鍊成丹砂腎鍊就硨磲心鍊成珊瑚此是七寶居身不散功成行滿跨鳳乘鸞飛昇金闕上朝玉帝永爲眞神仙矣
